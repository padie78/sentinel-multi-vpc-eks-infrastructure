name: "Sentinel Infrastructure Deployment"

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Necesario para OIDC
  contents: read

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # --- VALIDACIÓN ---
      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # --- DESPLIEGUE INFRA ---
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  kubernetes:
    name: "K8s Validation & Deploy"
    needs: terraform # Solo corre si Terraform termina bien
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- VALIDACIÓN DE MANIFIESTOS ---
      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo cp kubeval /usr/local/bin

      - name: Validate K8s Manifests
        run: kubeval -d k8s/ --ignore-missing-schemas

      # --- DEPLOY A CLUSTERS ---
      # Primero al Backend
      - name: Update Kubeconfig Backend
        run: aws eks update-kubeconfig --name eks-sentinel-backend --region ${{ secrets.AWS_REGION }}

      - name: Deploy Backend Services
        run: |
          kubectl apply -f k8s/backend/ --dry-run=client
          kubectl apply -f k8s/backend/

      # Luego al Gateway
      - name: Update Kubeconfig Gateway
        run: aws eks update-kubeconfig --name eks-sentinel-gateway --region ${{ secrets.AWS_REGION }}

      - name: Deploy Gateway Services
        run: |
          kubectl apply -f k8s/gateway/ --dry-run=client
          kubectl apply -f k8s/gateway/