name: "Sentinel Infrastructure Deployment"

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-west-1"

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  kubernetes:
    name: "K8s Validation & Deploy"
    needs: terraform
    runs-on: ubuntu-latest
    env:
      # Nombres basados en la lógica sentinel-eks-[layer]
      BACKEND_CLUSTER: "sentinel-eks-backend"
      GATEWAY_CLUSTER: "sentinel-eks-gateway"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.31.0'

      # Validación de manifiestos (Obligatorio en el examen)
      - name: Kubeval Validation
        uses: stefanprodan/kubeval-action@master
        with:
          files: k8s/

      # Despliegue Backend
      - name: Deploy to Backend
        run: |
          aws eks update-kubeconfig --name ${{ env.BACKEND_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl apply -f k8s/backend/ --dry-run=client
          kubectl apply -f k8s/backend/

      # Despliegue Gateway
      - name: Deploy to Gateway
        run: |
          aws eks update-kubeconfig --name ${{ env.GATEWAY_CLUSTER }} --region ${{ env.AWS_REGION }}
          # Nota: El proxy fallará si no has actualizado el ConfigMap con el DNS real del backend
          kubectl apply -f k8s/gateway/ --dry-run=client
          kubectl apply -f k8s/gateway/