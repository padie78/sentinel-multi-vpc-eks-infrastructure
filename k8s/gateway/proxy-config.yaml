apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
data:
  default.conf: |
    server {
        listen 80;

        location / {
            # The CI/CD Workflow will replace the following placeholder with the actual Backend NLB DNS
            proxy_pass http://REEMPLAZAR_CON_DNS_INTERNO_BACKEND;           
            
            # Standard proxy headers to ensure correct traffic forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Timeout settings to prevent the Gateway from hanging on upstream delays
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
        }
    }