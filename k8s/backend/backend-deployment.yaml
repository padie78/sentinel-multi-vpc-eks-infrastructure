apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-server
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: hello-app
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from Backend"
        ports:
        - containerPort: 5678
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer 
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678