apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-server
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: hello-app
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from backend"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP # Solo accesible internamente
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678